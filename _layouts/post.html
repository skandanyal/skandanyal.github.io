---
layout: default
---
<article class="post-container">
  <a href="{{ '/from_math_to_machines/' | relative_url }}" class="back-link mono">
    ← All Writing
  </a>
  
  <header class="post-header">
    <div class="post-date mono">{{ page.date | date: "%Y-%m-%d" }}</div>
    <h1 class="post-title">{{ page.title }}</h1>
  </header>

  <div class="prose">
    {{ content }}
  </div>

  <div class="comments-section">
    <script src="https://utteranc.es/client.js"
            repo="skandanyal/skandanyal.github.io"
            issue-term="pathname"
            theme="github-dark"
            crossorigin="anonymous"
            async>
    </script>
  </div>
</article>
