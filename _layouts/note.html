---
layout: default
---
<article class="post-container" style="max-width: 700px; margin: var(--space-lg) auto;">
  <a href="{{ '/notes/' | relative_url }}" class="back-link mono">
    ← All Notes
  </a>
  
  <header class="post-header">
    <div class="post-date mono">Observation // {{ page.date | date: "%Y-%m-%d" }}</div>
    <h1 class="post-title">{{ page.title }}</h1>
  </header>

  <div class="prose">
    {{ content }}
  </div>
</article>
